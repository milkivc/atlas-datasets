name: Continuous Integration

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  validate:
    name: Validate Metadata & Schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AJV CLI
        run: npm install -g ajv-cli

      - name: Validate metadata.json against schema
        run: |
          ajv validate -s .github/schemas/metadata-schema.json -d metadata.json --spec=draft7

      - name: Check JSON syntax
        run: |
          jq empty metadata.json
          for file in $(find . -type f -name "*.json" ! -path "./.git/*" ! -path "./.github/*"); do
            jq empty "$file" || { echo "Invalid JSON: $file"; exit 1; }
          done

  test-data:
    name: Test Data Integrity
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GDAL for geospatial validation
        run: sudo apt-get update && sudo apt-get install -y gdal-bin

      - name: Validate GeoJSON files
        run: |
          for file in $(find . -type f -name "*.geojson" ! -path "./.git/*"); do
            ogr2ogr -f "Memory" /dev/null "$file" 2>&1 || { echo "Invalid GeoJSON: $file"; exit 1; }
          done

      - name: Validate CSV files
        run: |
          for file in $(find . -type f -name "*.csv" ! -path "./.git/*"); do
            head -1 "$file" | grep -q "," || { echo "CSV without header: $file"; exit 1; }
          done

  lint:
    name: Lint Markdown & YAML
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: avturlyak/markdown-lint@v1
        with:
          config: '.github/markdownlint-config.json'
          args: '**/*.md'

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: '.github/yamllint-config.yml'
