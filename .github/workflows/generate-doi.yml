name: Generate DOI via Zenodo

on:
  release:
    types: [published]

jobs:
  generate-doi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Zenodo Deposit
        env:
          ORCID_ID: "0009-0004-9132-2925"
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.ZENODO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"metadata": {"title": "${{ github.event.release.name }}", "description": "${{ github.event.release.body }}", "creators": [{"name": "Associação MILK", "orcid": "0000-0000-0000-0000"}, {"name": "Eduardo Maurício Vieira Cabral e Araujo", "orcid": "'$ORCID_ID'"}], "license": "CC-BY-SA-4.0", "keywords": ["geoespacial", "Portugal", "património cultural", "dados abertos", "Zenodo"], "version": "${{ github.event.release.tag_name }}", "datePublished": "${{ github.event.release.published_at }}", "related_identifiers": [{"identifier": "${{ github.event.repository.html_url }}", "scheme": "url", "relation": "isSupplementTo"}]}}' \
            https://zenodo.org/api/deposit/depositions
      - name: Update Release with DOI
        env:
          ORCID_ID: "0009-0004-9132-2925"
        run: |
          DOI=$(curl -X POST \
            -H "Authorization: Bearer ${{ secrets.ZENODO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"metadata": {"title": "${{ github.event.release.name }}", "description": "${{ github.event.release.body }}", "creators": [{"name": "Associação MILK", "orcid": "0000-0000-0000-0000"}, {"name": "Eduardo Maurício Vieira Cabral e Araujo", "orcid": "'$ORCID_ID'"}], "license": "CC-BY-SA-4.0", "keywords": ["geoespacial", "Portugal", "património cultural", "dados abertos", "Zenodo"], "version": "${{ github.event.release.tag_name }}", "datePublished": "${{ github.event.release.published_at }}", "related_identifiers": [{"identifier": "${{ github.event.repository.html_url }}", "scheme": "url", "relation": "isSupplementTo"}]}}' \
            https://zenodo.org/api/deposit/depositions | jq -r '.metadata.doi')
          echo "DOI: $DOI"
          echo "DOI=$DOI" >> $GITHUB_ENV
